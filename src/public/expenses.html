<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Expenses</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">💰 Zamor's Expense Tracker</span>
      <a href="/" class="btn btn-light">Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6">
        <h2>Add New Expense</h2>
        <form id="expenseForm" class="card p-4">
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <input type="text" class="form-control" id="description" placeholder="e.g., Lunch at restaurant" required>
          </div>
          <div class="mb-3">
            <label for="amount" class="form-label">Amount ($)</label>
            <input type="number" class="form-control" id="amount" placeholder="0.00" step="0.01" required>
          </div>
          <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <select class="form-select" id="category" required>
              <option selected disabled>Select category...</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success w-100">Add Expense</button>
        </form>
        <div id="message" class="mt-3"></div>
      </div>

      <div class="col-md-6">
        <h2>Your Expenses</h2>
        <div id="expensesList" class="card">
          <div class="card-body">
            <p class="text-muted">Loading expenses...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load expenses on page load
    document.addEventListener('DOMContentLoaded', loadExpenses);

    // Form submission
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const description = document.getElementById('description').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;

      try {
        const response = await fetch('/api/expenses', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ description, amount, category })
        });

        if (response.ok) {
          showMessage('✅ Expense added successfully!', 'success');
          document.getElementById('expenseForm').reset();
          loadExpenses();
        } else {
          const error = await response.json();
          showMessage('❌ Error: ' + error.error, 'danger');
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'danger');
      }
    });

    // Load and display expenses
    async function loadExpenses() {
      try {
        const response = await fetch('/api/expenses');
        const expenses = await response.json();

        if (expenses.length === 0) {
          document.getElementById('expensesList').innerHTML = `
            <div class="card-body">
              <p class="text-muted">No expenses yet. Add one to get started!</p>
            </div>
          `;
          return;
        }

        let html = '<table class="table table-striped mb-0"><thead><tr><th>Description</th><th>Amount</th><th>Category</th></tr></thead><tbody>';
        
        expenses.forEach(expense => {
          html += `
            <tr>
              <td>${expense.description}</td>
              <td>$${parseFloat(expense.amount).toFixed(2)}</td>
              <td><span class="badge bg-primary">${expense.category}</span></td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('expensesList').innerHTML = html;
      } catch (error) {
        document.getElementById('expensesList').innerHTML = `
          <div class="card-body">
            <p class="text-danger">Error loading expenses: ${error.message}</p>
          </div>
        `;
      }
    }

    // Show message
    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="alert alert-${type}" role="alert">${text}</div>`;
      setTimeout(() => {
        messageDiv.innerHTML = '';
      }, 4000);
    }
  </script>
</body>
</html>
